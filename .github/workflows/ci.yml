name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Rust tests — mayara-server upstream tests
  # ─────────────────────────────────────────────
  rust-mayara-server-tests:
    name: Rust — mayara-server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mayara-server/target
          key: ${{ runner.os }}-cargo-server-${{ hashFiles('mayara-server/Cargo.lock') }}

      - name: Run mayara-server lib unit tests
        working-directory: mayara-server
        run: cargo test --lib --features emulator -- --nocapture

      - name: Run mayara-server integration tests (replay)
        working-directory: mayara-server
        run: cargo test --test replay_navico_4g --test replay_navico_br24 --test replay_navico_halo20plus --test replay_navico_halo24 --test replay_furuno --test replay_garmin --test replay_raymarine --features emulator -- --nocapture
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Job 2: Rust tests — mayara-jni bridge
  # ─────────────────────────────────────────────
  rust-jni-tests:
    name: Rust — mayara-jni tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mayara-jni/target
          key: ${{ runner.os }}-cargo-jni-${{ hashFiles('mayara-jni/Cargo.toml', 'mayara-server/Cargo.lock') }}

      - name: Run mayara-jni tests
        working-directory: mayara-jni
        run: cargo test -- --nocapture

  # ─────────────────────────────────────────────
  # Job 3: Android JVM unit tests
  # ─────────────────────────────────────────────
  android-unit-tests:
    name: Android — JVM unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}

      - name: Create stub libradar.so for JVM tests
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          # Create a minimal valid ARM64 ELF file (128 bytes) so Gradle accepts it
          # Real library is built separately by build-jni.yml
          printf '\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x03\x00\xb7\x00\x01\x00\x00\x00\x00\x00\x00\x00@\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00@\x00\x38\x00\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00' > app/src/main/jniLibs/arm64-v8a/libradar.so
          file app/src/main/jniLibs/arm64-v8a/libradar.so

      - name: Run JVM unit tests
        run: ./gradlew test --stacktrace

      - name: Build Debug APK (verify compilation)
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk

  # ─────────────────────────────────────────────
  # Job 4: Android Compose UI smoke test (Robolectric, no emulator)
  # ─────────────────────────────────────────────
  android-instrumented-tests:
    name: Android — Compose UI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}

      - name: Create stub libradar.so (arm64, for Gradle build)
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          # arm64-v8a stub (EM_AARCH64 = 0xb7) — needed so Gradle accepts the sourceSets
          printf '\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x03\x00\xb7\x00\x01\x00\x00\x00\x00\x00\x00\x00@\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00@\x00\x38\x00\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00' > app/src/main/jniLibs/arm64-v8a/libradar.so

      - name: Run Compose UI smoke test (Robolectric, no emulator needed)
        run: ./gradlew :app:testDebugUnitTest --tests "*.MainActivitySmokeTest" --stacktrace

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: app/build/reports/tests/
