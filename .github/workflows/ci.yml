name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Rust tests — mayara-server upstream tests
  # ─────────────────────────────────────────────
  rust-mayara-server-tests:
    name: Rust — mayara-server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain (1.90+)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.90"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mayara-server/target
          key: ${{ runner.os }}-cargo-server-${{ hashFiles('mayara-server/Cargo.lock') }}

      - name: Run mayara-server tests (emulator mode, no hardware)
        working-directory: mayara-server
        run: cargo test --features emulator -- --nocapture

  # ─────────────────────────────────────────────
  # Job 2: Rust tests — mayara-jni bridge
  # ─────────────────────────────────────────────
  rust-jni-tests:
    name: Rust — mayara-jni tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.90"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mayara-jni/target
          key: ${{ runner.os }}-cargo-jni-${{ hashFiles('mayara-jni/Cargo.toml', 'mayara-server/Cargo.lock') }}

      - name: Run mayara-jni tests
        working-directory: mayara-jni
        run: cargo test -- --nocapture

  # ─────────────────────────────────────────────
  # Job 3: Android JVM unit tests
  # ─────────────────────────────────────────────
  android-unit-tests:
    name: Android — JVM unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}

      - name: Create placeholder libradar.so (JVM tests do not load native lib)
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          touch app/src/main/jniLibs/arm64-v8a/libradar.so

      - name: Run JVM unit tests
        run: ./gradlew test --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/

  # ─────────────────────────────────────────────
  # Job 4: Android instrumented tests (Robolectric / on emulator)
  # ─────────────────────────────────────────────
  android-instrumented-tests:
    name: Android — Compose UI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM (required for AVD)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}

      - name: Create placeholder libradar.so
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          touch app/src/main/jniLibs/arm64-v8a/libradar.so

      - name: Run instrumented tests on AVD
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 26
          arch: x86_64
          target: default
          script: ./gradlew connectedAndroidTest --stacktrace

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: app/build/reports/androidTests/
