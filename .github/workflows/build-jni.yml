name: Build JNI Library (libradar.so)

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'mayara-jni/**'
      - 'mayara-server/**'
      - 'scripts/build_jni.sh'
      - '.github/workflows/build-jni.yml'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-android-jni:
    name: Build ARM64 JNI Library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust with Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # ubuntu-latest has NDK pre-installed at $ANDROID_HOME/ndk/.
      # We prefer 26.3.11579264; fall back to any available NDK if absent.
      - name: Locate Android NDK
        id: ndk
        run: |
          PREFERRED_NDK="26.3.11579264"
          NDK_DIR="${ANDROID_HOME}/ndk/${PREFERRED_NDK}"

          if [ ! -d "${NDK_DIR}" ]; then
            echo "NDK ${PREFERRED_NDK} not pre-installed; trying sdkmanager..."
            sdkmanager "ndk;${PREFERRED_NDK}" || true
          fi

          if [ ! -d "${NDK_DIR}" ]; then
            echo "Falling back to any available NDK..."
            NDK_DIR=$(ls -d "${ANDROID_HOME}/ndk/"*/ 2>/dev/null \
              | sort -V | tail -1 | sed 's|/$||')
          fi

          if [ -z "${NDK_DIR}" ] || [ ! -d "${NDK_DIR}" ]; then
            echo "ERROR: No Android NDK found." >&2
            echo "Available directories under \$ANDROID_HOME/ndk/:"
            ls -la "${ANDROID_HOME}/ndk/" 2>/dev/null || echo "  (empty or missing)"
            exit 1
          fi

          echo "Using NDK at: ${NDK_DIR}"
          echo "ANDROID_NDK_HOME=${NDK_DIR}" >> "${GITHUB_ENV}"

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mayara-jni/target
            mayara-server/target
          key: ${{ runner.os }}-cargo-jni-${{ hashFiles('mayara-jni/Cargo.toml', 'mayara-server/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-jni-

      - name: Cache cargo-ndk binary
        uses: actions/cache@v4
        id: cache-cargo-ndk
        with:
          path: ~/.cargo/bin/cargo-ndk
          key: ${{ runner.os }}-cargo-ndk-bin-v4

      - name: Install cargo-ndk
        if: steps.cache-cargo-ndk.outputs.cache-hit != 'true'
        run: cargo install cargo-ndk

      - name: Verify build environment
        run: |
          echo "=== Rust toolchain ==="
          rustc --version
          cargo --version
          rustup target list --installed | grep aarch64-linux-android \
            || { echo "ERROR: aarch64-linux-android target not installed" >&2; exit 1; }

          echo "=== cargo-ndk ==="
          cargo ndk --version

          echo "=== Android NDK ==="
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME}"
          test -d "${ANDROID_NDK_HOME}" \
            || { echo "ERROR: NDK not found at ${ANDROID_NDK_HOME}" >&2; exit 1; }

          echo "=== Git submodule ==="
          git submodule status
          test -d mayara-server/src \
            || { echo "ERROR: mayara-server submodule not initialised" >&2; exit 1; }

      - name: Build libradar.so (ARM64)
        run: |
          cd mayara-jni
          cargo ndk --target aarch64-linux-android --platform 26 -- build --release
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          RUST_BACKTRACE: full

      - name: Copy artifact into jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp mayara-jni/target/aarch64-linux-android/release/libradar.so \
             app/src/main/jniLibs/arm64-v8a/libradar.so
          echo "Built artifact:"
          ls -lh app/src/main/jniLibs/arm64-v8a/libradar.so
          file app/src/main/jniLibs/arm64-v8a/libradar.so

      - name: Upload libradar.so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libradar-so
          path: app/src/main/jniLibs/arm64-v8a/libradar.so
          retention-days: 90
          if-no-files-found: error

      - name: Commit and push libradar.so (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add app/src/main/jniLibs/arm64-v8a/libradar.so
          git diff --cached --exit-code \
            || git commit -m "build: update libradar.so [skip ci]"
          git push || echo "Nothing to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

